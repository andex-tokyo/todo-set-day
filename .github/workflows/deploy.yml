name: Deploy Apps Script

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: apps-script-deploy
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run syntax check
        run: npm run syntax

      - name: Validate secrets
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
          CLASP_TOKEN: ${{ secrets.CLASP_TOKEN }}
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          node -e 'const required=["CLASP_CREDENTIALS","CLASP_TOKEN","SCRIPT_ID"]; const missing=required.filter((name)=>!process.env[name]); if (missing.length) { console.error(`Missing required GitHub Secrets: ${missing.join(", ")}`); process.exit(1); } JSON.parse(process.env.CLASP_CREDENTIALS); JSON.parse(process.env.CLASP_TOKEN);'

      - name: Write clasp auth
        env:
          CLASP_CREDENTIALS: ${{ secrets.CLASP_CREDENTIALS }}
          CLASP_TOKEN: ${{ secrets.CLASP_TOKEN }}
        run: |
          node -e 'const fs=require("fs"); const credentials=JSON.parse(process.env.CLASP_CREDENTIALS); const token=JSON.parse(process.env.CLASP_TOKEN); fs.writeFileSync(`${process.env.HOME}/.clasprc.json`, JSON.stringify({ token, oauth2ClientSettings: credentials, isLocalCreds: false }, null, 2));'

      - name: Write clasp project
        env:
          SCRIPT_ID: ${{ secrets.SCRIPT_ID }}
        run: |
          node -e 'const fs=require("fs"); fs.writeFileSync(".clasp.json", JSON.stringify({ scriptId: process.env.SCRIPT_ID, rootDir: "." }, null, 2));'

      - name: Deploy
        run: npx clasp push --force
